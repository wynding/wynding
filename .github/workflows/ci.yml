name: CI

# Automated gate. Runs the same `verify` contributors run locally: Prettier
# check, then Turbo-orchestrated typecheck + lint + test across the workspace,
# then a build smoke gate. Turbo caches per package, so unaffected packages are
# skipped on re-runs.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least privilege — CI only reads the repo to install, lint, and test.
permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (format, typecheck, lint, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run verify
      # Build smoke gate — compile every package/app so a build-only breakage is
      # caught here rather than in a deploy. Artifacts are NOT uploaded; this is a
      # gate, not a release step.
      - run: pnpm run build
      # Initial-load budget gate (ADR 0005): the built app's initial JS must be
      # ≤ 3 MB gzipped. Runs after the build so the dist output exists.
      - run: pnpm run size

  # Accessibility gate (ADR 0003 §3): axe-core runs against the real DOM UI via the
  # Playwright e2e smoke and fails the build on any violation.
  a11y-e2e:
    name: a11y e2e (axe-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @wynding/web exec playwright install --with-deps chromium
      - run: pnpm --filter @wynding/web run e2e

  # Determinism gate, part 2: the sim's golden world-hash (determinism.test.ts) is
  # pinned to SIM_VERSION. A runtime test can't enforce that a golden *change* is
  # paired with a version bump, so this PR-only job diffs the golden against the
  # base branch and fails if it changed while SIM_VERSION did not.
  determinism-version:
    name: determinism golden ↔ SIM_VERSION
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require a SIM_VERSION bump when the determinism golden changes
        run: node scripts/check-determinism-version.mjs
        env:
          # The event's exact base commit — immune to main advancing mid-run.
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
